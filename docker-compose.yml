# ═══════════════════════════════════════════════════════════════
# BiblioTech — Docker Compose
#
# Services :
#   postgres  — Base de données PostgreSQL 16
#   redis     — Cache et files de messages Redis 7
#   api       — API REST NestJS (port 3001)
#
# Démarrage rapide :
#   cp .env.example .env        # remplir les variables
#   docker compose up -d        # lancer tous les services
#   docker compose logs -f api  # suivre les logs de l'API
#
# Arrêt :
#   docker compose down         # arrêter sans supprimer les données
#   docker compose down -v      # arrêter + supprimer les volumes
# ═══════════════════════════════════════════════════════════════

services:

  # ── Base de données ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bibliotech-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bibliotech
      POSTGRES_USER: bibliotech
      POSTGRES_PASSWORD: bibliotech_dev_2024
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - bibliotech_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bibliotech -d bibliotech"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Cache / Queues ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bibliotech-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - bibliotech_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── API NestJS ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: bibliotech-api
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      # Pointer vers les conteneurs Docker (pas localhost)
      DATABASE_URL: postgresql://bibliotech:bibliotech_dev_2024@postgres:5432/bibliotech?schema=public
      DIRECT_URL: postgresql://bibliotech:bibliotech_dev_2024@postgres:5432/bibliotech?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_TLS: "false"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Prometheus ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: bibliotech-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    depends_on:
      api:
        condition: service_healthy

  # ── Grafana ─────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: bibliotech-grafana
    restart: unless-stopped
    ports:
      - "3030:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: bibliotech2024
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3030
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

# ── Volumes persistants ─────────────────────────────────────
volumes:
  bibliotech_pgdata:
    driver: local
  bibliotech_redis:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
